<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Complete your order</title>
</head>
<body>
  <main>
    <h1>Checkout</h1>
    <form action="/orders" method="post">
      <fieldset>
        <legend>Contact</legend>
        <label>Email <input name="email" type="email" autocomplete="email" required></label>
        <label>Phone <input name="phone" type="tel" autocomplete="tel"></label>
      </fieldset>
      <fieldset>
        <legend>Delivery address</legend>
        <label>Street <input name="street" autocomplete="street-address" required></label>
        <label>City <input name="city" autocomplete="address-level2" required></label>
        <label>Postal code <input name="postal" autocomplete="postal-code" required></label>
        <label>Country
          <select name="country">
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="GB">United Kingdom</option>
          </select>
        </label>
      </fieldset>
      <label><input type="checkbox" name="updates"> Send delivery updates</label>
      <button type="submit">Place order</button>
    </form>
    <aside aria-label="Order summary">
      <h2>Summary</h2>
      <dl><dt>Subtotal</dt><dd>$42.00</dd><dt>Shipping</dt><dd>$5.00</dd></dl>
      <p><strong>Total: $47.00</strong></p>
    </aside>
  </main>
</body>
</html>
