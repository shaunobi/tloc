<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operations dashboard</title>
</head>
<body>
  <header>
    <h1>Service health</h1>
    <nav aria-label="Dashboard sections">
      <a href="#latency">Latency</a>
      <a href="#traffic">Traffic</a>
      <a href="#errors">Errors</a>
    </nav>
  </header>
  <main>
    <section id="latency" aria-labelledby="latency-title">
      <h2 id="latency-title">Latency</h2>
      <p><strong>p95:</strong> <data value="184">184 ms</data></p>
      <meter min="0" max="500" value="184">184 of 500</meter>
    </section>
    <section id="traffic" aria-labelledby="traffic-title">
      <h2 id="traffic-title">Traffic</h2>
      <table>
        <thead><tr><th>Region</th><th>Requests</th><th>Success</th></tr></thead>
        <tbody>
          <tr><th>West</th><td>12,402</td><td>99.97%</td></tr>
          <tr><th>East</th><td>10,881</td><td>99.94%</td></tr>
        </tbody>
      </table>
    </section>
    <section id="errors"><h2>Errors</h2><p>No active incident.</p></section>
  </main>
  <footer><small>Updated <time datetime="2026-07-22T12:00:00Z">moments ago</time></small></footer>
</body>
</html>
