version = 1
disable_existing_loggers = false

[formatters.structured]
format = "json"
timestamp = "rfc3339_nano"
fields = ["level", "message", "service", "trace_id"]

[handlers.console]
class = "stream"
level = "INFO"
formatter = "structured"
stream = "stderr"

[handlers.audit]
class = "rotating_file"
level = "NOTICE"
formatter = "structured"
filename = "var/log/audit.jsonl"
max_bytes = 10485760
backup_count = 7

[loggers.application]
handlers = ["console", "audit"]
level = "INFO"
propagate = false
